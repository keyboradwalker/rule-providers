p: &p
  type: http
  interval: 3600  # 自动更新订阅时间(秒)
  health-check:
    enable: true
    url: http://cp.cloudflare.com   
    interval: 300  # 节点连通性检测时间间隔(秒)   
    timeout: 1000 # 节点超时延迟(豪秒)   
    tolerance: 100 # 节点自动切换插值(毫秒)
proxy-providers: # 机场订阅，名称不能重复
  fatcatcloud:
    <<: *p
    proxy: "🟢 直连"
    url: "https://fcsblka.fcsubcn.cc:2096/api/v1/client/subscribe?token=540e968d044b320e19cf4dfd44849ff4" 
global-ua: clash # 用于下载订阅时指定UA
proxies:
  - { name: 🟢 直连, type: direct, udp: true}
pr: &pr {type: select, proxies: [🚀 节点选择, 🌐 手动选择]} # 策略锚点
proxy-groups: # 策略组
  - {name: 🚀 节点选择, type: select, proxies: [♻️ 自动选择, 🌐 手动选择]}
  - {name: 🌐 手动选择, type: select, include-all: true}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(直连|网址|流量|剩余|到期|订阅|过滤)).)*$"}
  - {name: 🐟 漏网之鱼,!!merge <<: *pr}
rules: #规则
  - RULE-SET, office, 🟢 直连
  - RULE-SET, github, 🚀 节点选择
  - RULE-SET, openai, 🚀 节点选择
  - RULE-SET, youtube, 🚀 节点选择
  - RULE-SET, google, 🚀 节点选择
  - RULE-SET, proxy, 🚀 节点选择
  - RULE-SET, cn, 🟢 直连  
  - MATCH,🐟 漏网之鱼  
rule-anchor: #规则集锚点
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  keyborad: &keyborad {type: http, interval: 86400, behavior: domain, format: text}
rule-providers: #规则集
  office: 
    <<: *keyborad
    path: ./providers/rule-set/office.list
    url: "https://raw.githubusercontent.com/keyboradwalker/rule-providers/main/cool_cn.list"
  bilibili: 
    <<: *domain
    path: ./providers/rule-set/bilibili.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo-lite/geosite/bilibili.mrs"
  cn: 
    <<: *domain
    path: ./providers/rule-set/cn_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo-lite/geosite/cn.mrs"
  github: 
    <<: *domain
    path: ./providers/rule-set/github_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo-lite/geosite/github.mrs"
  google:
    <<: *domain
    path: ./providers/rule-set/google_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo-lite/geosite/google.mrs"
  openai:
    <<: *domain
    path: ./providers/rule-set/openai_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo-lite/geosite/openai.mrs"  
  proxy:
    <<: *domain
    path: ./providers/rule-set/proxy_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo-lite/geosite/proxy.mrs"
  youtube:
    <<: *domain
    path: ./providers/rule-set/youtube_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo-lite/geosite/youtube.mrs"
tun:
  dns-hijiack:
    - tcp://any:53
    - udp://any:53
dns:
  nameserver-policy:
    rule-set:github,google,openai,proxy,youtube:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query